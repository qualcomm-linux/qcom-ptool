name: build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install linters
        run: |
          sudo snap install ruff
          sudo apt-get update
          sudo apt-get install -y mypy

      - name: Build all platforms and run tests
        env:
          PTOOL_SEED: qcom-ptool-ci
        run: |
          make lint
          make all integration

      - name: Run cargo
        run: |
          cd degpt
          cargo build
